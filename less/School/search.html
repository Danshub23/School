<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
    <select id="platform">
        <option value="bilibili">Bilibili</option>
    </select>
    <input type="text" id="topic" placeholder="输入关键词">
    <button id="loadBtn">加载</button>

    <!-- iframe 容器 -->
    <iframe id="player" width="100%" height="500"></iframe>

    <script>
        // 确保 DOM 加载完成后再执行
        document.getElementById('loadBtn').addEventListener('click', function() {
            const platform = document.getElementById('platform').value;
            const keyword = document.getElementById('topic').value;

            let url = '';
            if (platform === 'bilibili') {
                // 关键：必须加上 https:// 协议
                url = 'https://search.bilibili.com/all?keyword=' + encodeURIComponent(keyword);
            }
            // 设置 iframe 的 src
            const iframe = document.getElementById('player');
            iframe.src = url;
        });
    </script>
</body>
</html>
