<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字符表格</title>
    <style>
        table {
            width: 100%;
            text-align: center;

        }
    </style>
</head>

<body>
    <table border="1" id="tab">
        <thead>
            <tr>
                <th>2</th>
                <th>3</th>
                <th>5</th>
                <th>6</th>
                <th>7</th>
                <th>10</th>
                <th>11</th>
                <th>12</th>
                <th>19</th>
                <th>23</th>
                <th>25</th>
                <th>26</th>
                <th>27</th>
                <th>29</th>
                <th>32</th>
                <th>34</th>
            </tr>
        </thead>
        <tbody id="th0">
            <tr id="row0"> <!-- 给第一行一个ID，便于脚本添加单元格 -->
        </tbody>
    </table>
    <script>
        function add(create, container, id) {
            var m = document.createElement(create);
            if (id != undefined) {
                m.id = id
            }
            container.appendChild(m);
        }
        var rice = ['BCBCACCDAAAACABC','PABBACCCABAACCCB','PBCBBCCCAACABABA','PCBBACCAAACCCBCC']
        const table = document.getElementById('tab')
        for (let i = 0; i < 3; i++) {
            const tr = table.insertRow();      // 创建行
            for (let j = 0; j < 16; j++) {
                const td = tr.insertCell();    // 创建单元格
                td.textContent = rice[i][j];
            }
        }
    </script>
</body>

</html>
