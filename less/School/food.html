<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>饭单</title>
    <style>
      table {
        width: 100%;
        text-align: center;
      }

      .h {
        background-color: #ff9 !important;
      }
    </style>
  </head>

  <body>
    <table border="1" id="tab">
      <thead>
        <tr>
          <th id="d">11号</th>
          <th>2</th>
          <th>3</th>
          <th>5</th>
          <th>6</th>
          <th>7</th>
          <th>10</th>
          <th>11</th>
          <th>12</th>
          <th>19</th>
          <th>23</th>
          <th>25</th>
          <th>26</th>
          <th>27</th>
          <th>29</th>
          <th>32</th>
          <th>34</th>
          <th>A</th>
          <th>B</th>
          <th>C</th>
          <th>D</th>
          <th>E</th>
        </tr>
      </thead>
      <tbody id="th0"></tbody>
    </table>
    <button id="button">显示</button>
    <script>
      function add(create, container, id) {
        var m = document.createElement(create);
        if (id != undefined) {
          m.id = id;
        }
        container.appendChild(m);
      }
      function found(sen, str) {
        var num = 0;
        for (let i = 0; i < sen.length; i++) {
          if (sen[i] == str) {
            num += 1;
          }
        }
        return num;
      }
      var d = new Date();
      document.getElementById("d").innerHTML = d.getDate() + "号";
      var r = [
        "BCBCACCDAAAACABC",
        "DABBACCCABAACCCB",
        "BBCBBCCCAACABABA",
        "BCBBACCAAACCCBCC",
        "BBCADCAEBAEACBCB",
        "AACBACCCAAAACCCA",
        "BCBBBCCCBCCBCACC",
        "AABBACCCAAABCAAA",
        "BCCBBCCBBCBBCCBC",
        "CCDCACCBAACACECC",
        "ABBBACCBBACBCBBB",
        "CCBADCCABCAACCCA",
        "DCABBCCDABAACCCC",
        "CCCCACCBACBBCCCC",
        "AACCDCCBAECACCBC",
        "BCCCBCCAACACCCCC",
        "BBCABCBAABBBCBCB",
        "CCBCBCCAABBACBCC",
      ];
      var day = [
        4, 5, 6, 7, 8, 11, 12, 13, 14, 15, 18, 19, 20, 21, 22, 26, 27, 28,
      ];
      var table = document.getElementById("tab");
      for (let i = 0; i < r.length; i++) {
        var tr = table.insertRow();
        var td = tr.insertCell();
        td.textContent = day[i] + "/5";
        if (day[i] == d.getDate()) {
          td.parentNode.classList.add("h");
        } else {
          td.parentNode.style.display = "none";
        }
        for (let j = 0; j < 16; j++) {
          var td = tr.insertCell();
          td.textContent = r[i][j];
        }
        td = tr.insertCell();
        td.textContent = found(r[i], "A");
        td = tr.insertCell();
        td.textContent = found(r[i], "B");
        td = tr.insertCell();
        td.textContent = found(r[i], "C");
        td = tr.insertCell();
        td.textContent = found(r[i], "D");
        td = tr.insertCell();
        td.textContent = found(r[i], "E");
      }
      document.getElementById("button").addEventListener("click", bu);
      function bu() {
        table.style.display = "";
        document.querySelectorAll("tr").forEach((tr) => {
          tr.style.display = '';
          button.style.display = "none";
      })}
    </script>
    <!-- <br><br><br><br><br><br><br><br><br><br> -->
  </body>
</html>
