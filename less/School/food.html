<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字符表格</title>
    <style>
        table {
            width: 100%;
            text-align: center;

        }
    </style>
</head>

<body>
    <table border="1" id="tab">
        <thead>
            <tr>
                <th id='d'>Day</th>
                <th>2</th>
                <th>3</th>
                <th>5</th>
                <th>6</th>
                <th>7</th>
                <th>10</th>
                <th>11</th>
                <th>12</th>
                <th>19</th>
                <th>23</th>
                <th>25</th>
                <th>26</th>
                <th>27</th>
                <th>29</th>
                <th>32</th>
                <th>34</th>
                <th>A</th>
                <th>B</th>
                <th>C</th>
                <th>D</th>
                <th>E</th>
            </tr>
        </thead>
        <tbody id="th0">
            <tr id="row0">
        </tbody>
    </table>
    <script>
        function add(create, container, id) {
            var m = document.createElement(create);
            if (id != undefined) {
                m.id = id
            }
            container.appendChild(m);
        }
        function found(sen, str) {
            var num = 0;
            for (i = 0; i < sen.length; i++) {
                if (sen[i] == str) {
                    num += 1;
                }
            }
            return num
        var d = new Date();
        document.getElementById("d").innerHTML = (d.getDate() + '号');
        }
        var r = ['BCBCACCDAAAACABC', ' ABBACCCABAACCCB', ' BCBBCCCAACABABA', ' CBBACCAAACCCBCC',
                 ' BCADCAEBAEACBCB', ' ACBACCCAAAACCCA', ' CBBBCCCBCCBCACC', ' ABBACCCAAABCAAA',
                 ' CCBBCCBBCBBCCBC', ' CDCACCBAACACECC', ' BBBACCBBACBCBBB', ' CBADCCABCAACCCA',
                 ' CABBCCDABAACCCC', ' CCCACCBACBBCCCC', ' ACCDCCBAECACCBC', ' CCCBCCAACACCCCC',
                 ' BCABCBAABBBCBCB', ' CBCBCCAABBACBCC']
        var table = document.getElementById('tab')
        for (let i = 0; i < r.length; i++) {
            var tr = table.insertRow();
            var td = tr.insertCell();
            td.textContent = 'Day' + String(i + 1);
            for (let j = 0; j < 16; j++) {
                var td = tr.insertCell();
                td.textContent = r[i][j];
            }
            td = tr.insertCell();
            td.textContent = found(r[i], 'A');
            td = tr.insertCell();
            td.textContent = found(r[i], 'B');
            td = tr.insertCell();
            td.textContent = found(r[i], 'C');
            td = tr.insertCell();
            td.textContent = found(r[i], 'D');
            td = tr.insertCell();
            td.textContent = found(r[i], 'E');
        }
    </script>
</body>

</html>
