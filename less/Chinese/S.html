<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楚人賣珠 · 語譯注釋</title>
    <style>
        .ps {
            border-left: 7px soild brown;
        }
    </style>
</head>
<body>
    <h2>《韓非子》</h2>
    <div>
        <p class="ps">楚人有賣其珠於鄭者，為木蘭之櫃，<b>薰</b>以桂椒，<b>綴</b>以珠玉，飾以玫瑰，<b>輯</b>以羽翠，鄭人買其<b>櫝</b>
          而還其珠。此可謂<b>善</b>賣櫝矣，未可謂善<b>鬻</b>珠也。</p>
    </div>

    <!-- 語譯（白話翻譯） -->
    <h2>語譯</h2>
    <p class="ps">有一個楚國人到鄭國去賣他的珍珠，他用木蘭香木製作了一個匣子，用桂樹和花椒的香料熏香它，用珍珠寶石點綴它
      ，用紅色的美玉裝飾它，用翠鳥的羽毛鑲嵌它。一個鄭國人買下了這個匣子，卻把匣子裏的珍珠還給了楚國人。
      這個楚國人可以說是擅長賣匣子，卻不能說是擅長賣珍珠啊。</p>
    <div>
        <p><b>薰</b>：熏染、熏香。</p>
        <p><b>綴</b>：點綴、裝飾。</p>
        <p><b>輯</b>：聚集，此處指鑲嵌、裝飾。</p>
        <p><b>櫝</b>：木匣、木盒。</p>
        <p><b>善</b>：擅長、善於。</p>
        <p><b>鬻</b>：賣、出售。</p>
    </div>

</body>
</html>
