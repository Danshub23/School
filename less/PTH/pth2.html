<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鴉片戰爭·虎門銷煙</title>
    <style>
        * {
            box-sizing: border-box;
        }
        p {
            margin: 0 0 2.5em 0;
            padding: 1em;
            color: black;
            text-shadow: 2px 2px 7px rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid black;
            border-right: 3px solid black;
            background-color: #FFF4E6;
        }
        .d1 {
            display: flex;
        }
        h2 {
            width: 60%;
        }
        #c12 {
            justify-content: center;
            align-items: center;
            width: 40%;
        }
        .n {
            width: 15%;
            justify-content: center;
            align-items: center;
        }
        .button {
            width: 10%;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="d1">
        <h2>第一幕：1839年6月 廣州，欽差大臣行館</h2>
        <div id="c12">
            <label for="c1">選擇字體大小：</label>
            <select id="c1" name="c1">
                <option value="10px">10</option>
                <option value="14px">14</option>
                <option value="18px">18</option>
                <option value="24px" selected>24</option>
                <option value="32px">32</option>
                <option value="36px">36</option>
                <option value="40px">40</option>
            </select>
        </div>
    </div>
    <br>
    <div id="text">
        <script>
            const select = document.getElementById('c1');
            const content = document.getElementById('text');
            function changeFontSize() {
                content.style.fontSize = select.value;
            }
            select.addEventListener('change', changeFontSize);
            changeFontSize();
        </script>

        <div class="d1">
            <div class="n">
                <label for="n1">林则徐：</label>
                <select id="n1" name="n1">
                    <option value="2" selected>2</option>
                    <option value="23">23</option>
                    <option value="34">34</option>
                </select>
            </div>
            <div class="n">
                <label for="n2">義律：</label>
                <select id="n2" name="n2">
                    <option value="2" selected>2</option>
                    <option value="23">23</option>
                    <option value="34">34</option>
                </select>
            </div>
            <div class="n">
                <label for="n3">旁白：</label>
                <select id="n3" name="n3">
                    <option value="2" selected>2</option>
                    <option value="23">23</option>
                    <option value="34">34</option>
                </select>
            </div>
            <div class="n">
                <label for="n4">官員：</label>
                <select id="n4" name="n4">
                    <option value="2" selected>2</option>
                    <option value="23">23</option>
                    <option value="34">34</option>
                </select>
            </div>
            <div class="n">
                <label for="n5">阿明：</label>
                <select id="n5" name="n5">
                    <option value="2" selected>2</option>
                    <option value="23">23</option>
                    <option value="34">34</option>
                </select>
            </div>
            <button id="re" class="button">刷新劇本</button>
        </div>

        <a href="pth.html">原版</a>
        <!-- 第一幕 p0~p13（14段） 第二幕 p14~p24（11段） 总计25段 -->
        <p id="p0"></p><p id="p1"></p><p id="p2"></p><p id="p3"></p>
        <p id="p4"></p><p id="p5"></p><p id="p6"></p><p id="p7"></p>
        <p id="p8"></p><p id="p9"></p><p id="p10"></p><p id="p11"></p>
        <h2>第二幕 時間：1839年6月3日 地點：虎門海灘</h2>
        <p id="p12"></p><p id="p13"></p>
        <p id="p14"></p><p id="p15"></p><p id="p16"></p><p id="p17"></p>
        <p id="p18"></p><p id="p19"></p><p id="p20"></p><p id="p21"></p>
        <p id="p22"></p><p id="p23"></p>
    </div>

    <script>
        function updateScript() {
            const a = document.getElementById('n1').value + '（林則徐）';
            const b = document.getElementById('n2').value + '（義律）';
            const d = document.getElementById('n3').value + '（旁白）';
            const e = document.getElementById('n4').value + '（官員）';
            const c = document.getElementById('n5').value + '（阿明）';

            const list = [
                // ----- 第一幕（廣州行館）-----
                '（' + d + '走到中央，神情凝重）19世紀初，鴉片如幽靈般籠罩著大清国土。無數人因它傾家蕩產，國庫白銀大量外流。國家危難之際，道光皇帝任命林則徐為欽差大臣，前往廣東主持禁煙！',
                '（' + a + '正襟危坐，義律被帶到堂前，態度輕蔑。）',
                a + '：（拍案而起，聲如洪鐘）' + b + '！你等英商，為一己私利，用鴉片毒害我大清國民，民不聊生，國力日衰！此等禍國殃民之舉，天理不容！',
                b + '：（冷笑一聲）林大人，你們中國人自己貪婪，官員受賄縱容，卻把罪過全推給商人？',
                a + '：（怒目而視）一派胡言！若鴉片無害，何不讓爾等國王吸食？本官奉皇上聖旨，限你等三日內交出所有鴉片，不許私藏！否則，休怪本官不講情面！',
                b + '：（態度強硬）絕無可能！（提高聲調）你扣押商船、封锁商馆，这是对大不列颠及北爱尔兰联合王国的践踏！我女王的皇家海军，不会坐视不理的！',
                a + '：（眼神凌厲，緩緩站起）這不是財產，是毒藥！來人，封鎖商館，斷其水糧！',
                '（' + b + '臉色一變，但仍強撐）',
                '義律：你……你敢！',
                '林則徐：交出鴉片，水糧即復。否則，等來的不是軍艦，是饑渴。',
                '義律：……我交出鴉片，但這筆賬，英國不會忘記！',
                '（林則徐一揮手。'+ b +'被'+ e +'带下。）',

                // ----- 第二幕（虎門銷煙） 原版内容，仅修改最后一句 -----
                '（海灘上挖了兩個巨大的銷煙池。' + c + '和許多百姓在遠處圍觀。）',
                c + '：（對著大海，緊握拳頭）爹..娘..就是這東西害了我們全家！今天，兒子要親眼看著它灰飛煙滅，為你們，也為我自己，討回一個公道！',
                '（' + a + '登上高台，神情肅穆。' + b + '等外國商人站在一旁，臉色鐵青。）',
                e + '：（高聲宣布）欽差大臣有令！虎門銷煙，即刻開始！',
                '（官兵們將一箱箱鴉片撬開，倒入銷煙池中。）',
                a + '：（大聲下令）遵「海水浸化法」！引海水入池，泡开烟土！再抛石灰，池水沸腾！官兵用锄头搅拌，化成浊浆！待退潮时，全部冲入大海！',
                '（官兵們將鹽和石灰倒人池中，池水頓時沸騰，冒出滾滾濃煙。一股刺鼻的氣味瀰漫開來。）',
                c + '：（高喊）燒得好！燒掉這些害人的東西！林大人英明！',
                '（圍觀百姓紛紛叫好。' + b + '驚地看著眼前的一切，鴉片化為烏有。）',
                a + '：（轉身面對' + b + '，義正詞嚴）' + b + '！你和所有的外國商人都看清楚了！這，就是我中華禁絕鴉片的決心！若再有私運鴉片入境者，人貨俱焚！',
                '（百姓歡呼聲震天。' + a + '轉身遠望大海，威風凜凜。）',
                ' （林則徐看了看鴉片，又看了看英國的「商船」。不過，洋人必不罢休。願大清平安)'
            ];

            for (let i = 0; i < list.length; i++) {
                const p = document.getElementById('p' + i);
                if (p) p.innerText = list[i];
            }
        }

        updateScript();
        document.getElementById('re').addEventListener('click', updateScript);
    </script>
</body>
</html>
