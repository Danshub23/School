我参考了一些模型和写一个简单的：<!DOCTYPE html>
<html>
<head>
    <style>
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');

        let player = {
            x: 400,
            y: 300,
            width: 50,
            height: 50,
            speedPerFrame: 5   
        };

        let keys = {
            ArrowUp: false, ArrowDown: false,
            ArrowLeft: false, ArrowRight: false
        };
        window.addEventListener('keydown', (e) => { if (keys[e.key] !== undefined) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys[e.key] !== undefined) keys[e.key] = false; });

        let lastUpdateTime = 0;
        const FIXED_UPDATE_INTERVAL = 1000 / 60;   // 16.67ms → 每秒固定60次更新

        function update() {
            
            if (keys.ArrowUp)    player.y -= player.speedPerFrame;
            if (keys.ArrowDown)  player.y += player.speedPerFrame;
            if (keys.ArrowLeft)  player.x -= player.speedPerFrame;
            if (keys.ArrowRight) player.x += player.speedPerFrame;

            // 边界限制
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > 800) player.x = 800 - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > 600) player.y = 600 - player.height;
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            ctx.fillStyle = 'red';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

       
        function gameLoop(now) {
            requestAnimationFrame(gameLoop);
            if (!lastUpdateTime) {
                lastUpdateTime = now;
                return;
            }
            if (now - lastUpdateTime >= FIXED_UPDATE_INTERVAL) {
                update();   // 每秒固定执行约60次，每次移动5像素
                draw();
                lastUpdateTime = now - ((now - lastUpdateTime) % FIXED_UPDATE_INTERVAL);
            }
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
