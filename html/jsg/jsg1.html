<!DOCTYPE html>
<html>
<head>
    <style>
        canvas { border: 1px solid black; }
    </style>
    <title>成语</title>
</head>
<body>
    <button id="btn0">上</button>
    <button id="btn1">下</button>
    <script src="https://unpkg.com/phaser@3.9.0/dist/phaser.min.js"></script>
    <script>
        document.getElementById('btn0').addEventListener('click', function(){
                player.y += 5
        var config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        var game = new Phaser.Game(config);

        function preload() {
            // 无需加载资源
        }

        function create() {
            // 红色方块，大小 50x50，初始位置 (400,300)
            this.player = this.add.rectangle(400, 300, 50, 50, 0xff0000);
            this.player.setOrigin(0, 0);

            // 速度：300 像素/秒（相当于原 60帧×5像素 的手感）
            this.playerSpeed = 300;

            // 绑定方向键
            /*this.keys = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.UP,
                down: Phaser.Input.Keyboard.KeyCodes.DOWN,
                left: Phaser.Input.Keyboard.KeyCodes.LEFT,
                right: Phaser.Input.Keyboard.KeyCodes.RIGHT
            });*/

            // 设置白色背景（与原来 Canvas 默认一致）
            this.cameras.main.setBackgroundColor('#ffffff');
        }

        function update(time, delta) {
            
            })
            var player = this.player;
            // 根据本帧时间差计算移动距离
            var moveAmount = this.playerSpeed * (delta / 1000);

            // 边界限制 (800x600 的游戏区域)
            var gameW = 800, gameH = 600, pw = 50, ph = 50;
            if (player.x < 0) player.x = 0;
            if (player.x + pw > gameW) player.x = gameW - pw;
            if (player.y < 0) player.y = 0;
            if (player.y + ph > gameH) player.y = gameH - ph;
        }
    </script>
</body>
</html>
