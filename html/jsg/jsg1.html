<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script src="phaser.js"></script>
    <script>
      var config = {
        type: Phaser.AUTO,
        width: 900,
        height: 550,
        backgroundColor: "0x00F2FF",
        scale: {
        mode: Phaser.Scale.FIT,      // FIT 模式
        autoCenter: Phaser.Scale.CENTER_BOTH  // 自动居中
    },
        scene: {
          //autoCenter: Phaser.Scale.CENTER_BOTH,
          preload: preload,
          create: create,
          update: update,
        },
      };

      var game = new Phaser.Game(config);

      function preload() {
        this.load.image("ball", "img/Ball.jpeg");
      }

      function create() {
        this.player = this.add.sprite(400, 300, "ball");
        this.player_speed = 0.1;
        this.base = this.add.circle(150, 400, 75, 0x000000);
        this.r = this.add.circle(this.base.x, this.base.y, 40, 0xa6a6a6);
        this.r.setInteractive();
        this.ting2 = false;
      }

      function update() {
        const pointer = this.input.activePointer;
        const bounds = this.r.getBounds();

        //
        //   if (Phaser.Math.Distance.Between(this.r.x, this.r.y, pointer.x, pointer.y) > 100) {
        //     this.player.y += 5;
        //   }
        //
        // } else {
        //   this.r.x = 200;
        //   this.r.y = 450;

        if (this.ting2 == false && bounds.contains(pointer.x, pointer.y) && pointer.isDown) {
          this.ting2 = true;
        } else if (!pointer.isDown) {
          this.ting2 = false;
        }
        if (this.ting2) {
          this.r.rotation = Phaser.Math.Angle.Between(this.r.x, this.r.y, pointer.x, pointer.y);
          this.Angle = Phaser.Math.Angle.Between(this.base.x, this.base.y, pointer.x, pointer.y);
          this.Distance = Phaser.Math.Distance.Between(this.base.x, this.base.y, pointer.x, pointer.y);
          if (this.Distance <= 75) {
            this.r.x = this.base.x + Math.cos(this.Angle) * this.Distance;
            this.r.y = this.base.y + Math.sin(this.Angle) * this.Distance;
          } else {
            this.r.x = this.base.x + Math.cos(this.Angle) * 75;
            this.r.y = this.base.y + Math.sin(this.Angle) * 75;
          }
          this.player.x += Math.cos(this.Angle) * this.Distance * this.player_speed;
          this.player.y += Math.sin(this.Angle) * this.Distance * this.player_speed;
        } else {
          this.r.x = 150;
          this.r.y = 400;
          this.r.rotation = 0;
        }
      }
    </script>
  </body>
</html>
