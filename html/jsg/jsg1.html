<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <script src="phaser.js"></script>
    <script>
      var config = {
        type: Phaser.AUTO,
        width: 900,
        height: 550,
        scene: {
          //autoCenter: Phaser.Scale.CENTER_BOTH,
          preload: preload,
          create: create,
          update: update,
        },
      }

      var game = new Phaser.Game(config)

      function preload() {
        this.load.image("sky", "img/ball.jpeg")
      }

      function create() {
        this.player = this.add.sprite(400,300,'sky')
        this.player_speed = 8
        this.rect_r = this.add.rectangle(800, 275, 80, 80, 0xff0000)
        this.rect_r.setInteractive();
        this.rect_l = this.add.rectangle(100, 275, 80, 80, 0xff0000)
        this.rect_l.setInteractive();
        this.rect_r.on('pointerover', () => {
        this.player.x += this.player_speed;})
        this.rect_l.on('pointerover', () => {
        this.player.x -= this.player_speed;})
        this.r = this.add.rectangle(200, 450, 40, 40, 0xff0000)
        this.r.setInteractive();
      }

      function update() {
        const pointer = this.input.activePointer;
        const bounds = this.player.getBounds();
        //&& bounds.contains(pointer.x, pointer.y)
        if (pointer.isDown) {
          this.r.x = pointer.x;
          this.r.y = pointer.y;
      }
        else {
          this.r.x = 200;
          this.r.y = 450;
        }
      }
    </script>
  </body>
</html>
