<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>
  </head>

  <body id="b1">
    <button id="butt1">run</button>
    <p id="p1">?</p>
    <script>
      document.getElementById("p1").textContent = document.referrer;
      console.log(document.referrer);
      function ch() {
        if (document.referrer !== "https://danshub23.github.io/School/less/Chinese/Chinese.html") {
          var body = document.getElementById("b1");

          body.style.display = "none";
          window.location.replace('https://www.tkpss.edu.hk');
        }
      }
      function run() {
        window.location.replace("https://www.tkpss.edu.hk");
      }
      window.addEventListener("pageshow", ch);
      window.addEventListener("load", ch);
      document.getElementById("butt1").addEventListener("click", run);
    </script>
  </body>
</html>
