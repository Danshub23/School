<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>成语</title>
    <style>
      div {
        text-align: center;
        margin: 75px 20px;
      }

      button {
        height: 35px;
        width: 60px;
        margin: 5px 2%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div>
      <textarea rows="4" id="text"></textarea>
    </div>
    <div>
      <button>存储</button>
      <button>新增一行</button>
    </div>
    <script>
      const text = document.getElementById("text")
      if (localStorage.getItem("cod") === null) {
        localStorage.setItem("cod", "");
      }
      else {
        text.value = localStorage.getItem("cod")
      }
      if (localStorage.getItem("row") === null) {
        localStorage.setItem("row", "4");
      }
      function change() {
        localStorage.setItem("cod", text.value);
        localStorage.setItem("row", text.rows);
      }
      function addline() {
        text.rows += 1
        localStorage.setItem("row", text.rows);
      }

      document.getElementsByTagName("button")[0].addEventListener("click", change)
      document.getElementsByTagName("button")[1].addEventListener("click", addline)
    </script>
  </body>
</html>
