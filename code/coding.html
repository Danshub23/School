<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>成语</title>
    <style>
      div {
        text-align: center;
        margin: 75px 20px;
      }

      button {
        height: 35px;
        width: 60px;
        margin: 5px 2%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div>
      <textarea row="4" id="text"></textarea>
    </div>
    <div>
      <button>存储</button>
    </div>
    <script>
      text = document.getElementsByID("text")
      if (localStorage.getItem(cod") == null) {
        localStorage.setItem("cod", "");
      }
      else {
        text.textContext = localStorage.getItem(cod")
      }
      function change() {
        localStorage.setItem("cod", text.textContent);
      }

      document.getElementsByTagName("button")[0].addEventListener("click", change)
    </script>
  </body>
</html>
