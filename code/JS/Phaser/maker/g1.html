<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G1</title>
  </head>
  <body>
    <script src="phaser.js"></script>
    <script>
      var config = {
        type: Phaser.AUTO,
        width: 1000,
        height: 600,
        backgroundColor: "0x00F2FF",
        scale: {
        autoCenter: Phaser.Scale.CENTER_BOTH  // 自动居中
    },
        scene: {
          //autoCenter: Phaser.Scale.CENTER_BOTH,
          preload: preload,
          create: create,
          update: update,
        },
      };

      var game = new Phaser.Game(config);

      function preload() {
        //this.load.image("", "");
    
      }

      function create() {
        this.line_color = 0x000000
        //this.player = this.add.sprite(400, 300, "ball");
        this.player = this.add.rectangle(500, 300, 20, 20, 0xff0000);
        this.player.Angl = 60
        this.left_line = this.add.rectangle(250, 300, 10, 500, this.line_color);
        this.right_line = this.add.rectangle(750, 300, 10, 500, this.line_color);
        this.top_line = this.add.rectangle(500, 50, 10, 500, this.line_color);
        this.top_line.angle = 90;
        this.bottom_line = this.add.rectangle(500, 550, 10, 500, this.line_color);
        this.bottom_line.angle = 90;
      }
      function update() {
        this.player.x += Math.cos(this.player.Angl) * 2;
        this.player.y += Math.sin(this.player.Angl) * 2;
        }
      }
    </script>
  </body>
</html>
