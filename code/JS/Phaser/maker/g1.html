<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G1</title>
  </head>
  <body>
    <script src="phaser.js"></script>
    <script>
      var config = {
        type: Phaser.AUTO,
        width: 1000,
        height: 600,
        backgroundColor: "0x00F2FF",
        scale: {
        autoCenter: Phaser.Scale.CENTER_BOTH  // 自动居中
    },
        scene: {
          //autoCenter: Phaser.Scale.CENTER_BOTH,
          preload: preload,
          create: create,
          update: update,
        },
      };
function checkAABB(a, b) {
    const aLeft   = a.x - a.width / 2;
    const aRight  = a.x + a.width / 2;
    const aTop    = a.y - a.height / 2;
    const aBottom = a.y + a.height / 2;
    const bLeft   = b.x - b.width / 2;
    const bRight  = b.x + b.width / 2;
    const bTop    = b.y - b.height / 2;
    const bBottom = b.y + b.height / 2;
    return aLeft < bRight && aRight > bLeft && aTop < bBottom && aBottom > bTop;
}
function reflect(incidentAngle, normalAngle) {
    let reflection = 2 * normalAngle - incidentAngle;
    const PI = Math.PI;
    const TWO_PI = 2 * PI;
    reflection = ((reflection + PI) % TWO_PI + TWO_PI) % TWO_PI - PI;
    return reflection;
}
      var game = new Phaser.Game(config);

      function preload() {
        //this.load.image("", "");
    
      }

      function create() {
        this.line_color = 0x000000
        //this.player = this.add.sprite(400, 300, "ball");
        this.player = this.add.rectangle(500, 300, 20, 20, 0xff0000);
        this.player.de = 1.5
        this.left_line = this.add.rectangle(250, 300, 10, 500, this.line_color);
        this.right_line = this.add.rectangle(750, 300, 10, 500, this.line_color);
        this.top_line = this.add.rectangle(500, 50, 500, 10, this.line_color);
        this.bottom_line = this.add.rectangle(500, 550, 500, 10, this.line_color);
      }
      function update() {
        this.player.de;
        this.player.x += Math.cos(this.player.de) * 2;
        this.player.y += Math.sin(this.player.de) * 2;
        if (checkAABB(this.player,this.bottom_line)){
          this.player.de = reflect(this.player.de,this.bottom_line.rotation)
        }
      }
    </script>
  </body>
</html>
